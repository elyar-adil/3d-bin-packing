<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>3D 装箱优化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<div id="app-wrapper">

    <!-- Header -->
    <div id="app-header">
        <div class="header-icon">&#x1F4E6;</div>
        <div>
            <h1>3D 装箱优化</h1>
            <p class="subtitle">3D Bin Packing Solver</p>
        </div>
    </div>

    <div id="app-body">

        <!-- ─── Sidebar ─────────────────────────────── -->
        <div id="sidebar">
            <div id="sidebar-resize-handle"></div>

            <!-- Panel 1: Container Setup -->
            <div class="panel-card">
                <div class="panel-header" id="hdr-container">
                    <span class="panel-drag-grip">&#8942;</span>
                    &#x1F4E6; 容器设置
                    <span class="toggle-icon">&#9660;</span>
                </div>
                <div class="panel-body" id="panel-container">
                    <div class="type-toggle">
                        <button id="btn-type-container" class="active" onclick="setContainerType('container')">容器</button>
                        <button id="btn-type-pallet"               onclick="setContainerType('pallet')">托盘</button>
                    </div>

                    <div id="container-presets-row">
                        <label class="form-label">预设</label>
                        <select class="form-control" id="container-preset" onchange="applyContainerPreset()">
                            <option value="">-- 自定义 --</option>
                            <option value="0">小型集装箱 (200×220×200)</option>
                            <option value="1">标准容器 (300×250×250)</option>
                            <option value="2">货架格位 (120×100×80)</option>
                        </select>
                    </div>

                    <div id="pallet-presets-row" style="display:none;">
                        <label class="form-label">托盘规格</label>
                        <select class="form-control" id="pallet-preset" onchange="applyPalletPreset()">
                            <option value="">-- 自定义 --</option>
                            <option value="EUR">EUR托盘 (120×80cm)</option>
                            <option value="US">美标托盘 (48×40in)</option>
                            <option value="CN_T1">国标T1托盘 (120×100cm)</option>
                            <option value="CN_T2">国标T2托盘 (100×80cm)</option>
                        </select>
                    </div>

                    <div style="margin-top:8px;">
                        <label class="form-label">尺寸 (cm)</label>
                        <div class="dim-group">
                            <div>
                                <div class="dim-label">宽 W</div>
                                <input class="form-control" id="cont-w" type="number" step="1" value="300" min="1">
                            </div>
                            <div>
                                <div class="dim-label">高 H</div>
                                <input class="form-control" id="cont-h" type="number" step="1" value="250" min="1">
                            </div>
                            <div>
                                <div class="dim-label">深 D</div>
                                <input class="form-control" id="cont-d" type="number" step="1" value="250" min="1">
                            </div>
                        </div>
                    </div>

                    <div id="deck-height-row" style="display:none; margin-top:6px;">
                        <label class="form-label">托盘板高度 (cm)</label>
                        <input class="form-control" id="cont-deck-h" type="number" step="0.1" value="14.4" min="0">
                    </div>

                    <div style="margin-top:6px;">
                        <label class="form-label">&#x2696;&#xFE0F; 最大载重 (kg)</label>
                        <input class="form-control" id="cont-maxweight" type="number" step="10" value="30000" min="0">
                    </div>

                    <button class="btn btn-primary btn-block mt-2" onclick="applyContainer()">应用容器</button>
                </div>
            </div>

            <!-- Panel 2: Add Box -->
            <div class="panel-card">
                <div class="panel-header" id="hdr-addbox">
                    <span class="panel-drag-grip">&#8942;</span>
                    &#x2795; 添加箱子
                    <span class="toggle-icon">&#9660;</span>
                </div>
                <div class="panel-body" id="panel-addbox">
                    <label class="form-label">快速选择</label>
                    <select class="form-control" id="box-preset" onchange="applyBoxPreset()">
                        <option value="">-- 自定义 --</option>
                        <option value="0">快递小箱 (22×9×17)</option>
                        <option value="1">快递中箱 (31×12×24)</option>
                        <option value="2">快递大箱 (39×18×29)</option>
                        <option value="3">电商小箱 (20×10×15)</option>
                        <option value="4">电商中箱 (35×15×25)</option>
                        <option value="5">电商大箱 (50×30×40)</option>
                        <option value="6">仓储标准箱 (40×30×30)</option>
                        <option value="7">仓储大箱 (60×40×40)</option>
                    </select>

                    <div style="margin-top:8px;">
                        <label class="form-label">尺寸 (cm)</label>
                        <div class="dim-group">
                            <div>
                                <div class="dim-label">宽 W</div>
                                <input class="form-control" id="box-w" type="number" step="1" value="31" min="1">
                            </div>
                            <div>
                                <div class="dim-label">高 H</div>
                                <input class="form-control" id="box-h" type="number" step="1" value="12" min="1">
                            </div>
                            <div>
                                <div class="dim-label">深 D</div>
                                <input class="form-control" id="box-d" type="number" step="1" value="24" min="1">
                            </div>
                        </div>
                    </div>

                    <div class="row-2col mt-2">
                        <div>
                            <label class="form-label">&#x2696;&#xFE0F; 重量 (kg)</label>
                            <input class="form-control" id="box-weight" type="number" step="0.1" value="1" min="0">
                        </div>
                        <div>
                            <label class="form-label">顶部载重 (kg)</label>
                            <input class="form-control" id="box-maxwtop" type="number" step="1" value="30" min="0">
                        </div>
                    </div>

                    <div class="mt-2">
                        <label class="form-label">数量</label>
                        <input class="form-control" id="box-qty" type="number" value="5" min="1" max="200">
                    </div>

                    <!-- Constraints collapsible -->
                    <button class="constraints-toggle" onclick="toggleConstraints()" id="constraints-toggle-btn">
                        &#9656; 高级约束设置
                    </button>

                    <div id="constraints-panel" style="display:none;">
                        <div class="form-check mb-1">
                            <input class="form-check-input" type="checkbox" id="box-fragile">
                            <label class="form-check-label" for="box-fragile">
                                &#x26A0;&#xFE0F; 易碎品 (顶部不可放箱)
                            </label>
                        </div>

                        <div class="mb-1">
                            <label class="form-label">旋转约束</label>
                            <select class="form-control" id="box-orientation">
                                <option value="FREE">自由旋转</option>
                                <option value="UPRIGHT">直立放置</option>
                                <option value="FIXED">固定方向</option>
                            </select>
                        </div>

                        <div class="mb-1">
                            <label class="form-label">组名 (同组优先放一起)</label>
                            <input class="form-control" id="box-group" type="text" placeholder="留空表示无组">
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="box-isolated">
                            <label class="form-check-label" for="box-isolated">
                                隔离放置 (与其他组不相邻)
                            </label>
                        </div>
                    </div>

                    <div class="mt-2">
                        <label class="form-label">名称标签</label>
                        <input class="form-control" id="box-label" type="text" placeholder="可选">
                    </div>

                    <button class="btn btn-success btn-block mt-2" onclick="addBoxes()">
                        &#x2795; 添加
                    </button>
                </div>
            </div>

            <!-- Panel 3: Algorithm -->
            <div class="panel-card">
                <div class="panel-header" id="hdr-algo">
                    <span class="panel-drag-grip">&#8942;</span>
                    &#x2699;&#xFE0F; 算法选择
                    <span class="toggle-icon">&#9660;</span>
                </div>
                <div class="panel-body" id="panel-algo">
                    <div class="algo-option selected" onclick="selectAlgo('heuristic', this)">
                        <input type="radio" name="algo" value="heuristic" checked>
                        <span class="algo-name">启发式贪心</span>
                        <div class="algo-desc">快速启发式算法，适合大多数场景</div>
                    </div>
                    <div class="algo-option" onclick="selectAlgo('guillotine', this)">
                        <input type="radio" name="algo" value="guillotine">
                        <span class="algo-name">断切算法</span>
                        <div class="algo-desc">基于空间切割的算法，空间利用率较高</div>
                    </div>
                    <div class="algo-option" onclick="selectAlgo('maxspaces', this)">
                        <input type="radio" name="algo" value="maxspaces">
                        <span class="algo-name">极大空间算法</span>
                        <div class="algo-desc">维护最大自由空间集合，装箱率最优</div>
                    </div>
                    <div class="algo-option" onclick="selectAlgo('annealing', this)">
                        <input type="radio" name="algo" value="annealing">
                        <span class="algo-name">模拟退火</span>
                        <div class="algo-desc">全局优化算法，装箱率最高但速度较慢</div>
                    </div>

                    <button class="btn-solve mt-3" id="solve-button" onclick="doSolve()">
                        <span id="solve-icon">&#x25B6;</span>
                        <span id="solve-text">开始求解</span>
                        <span class="spinner-ring" id="spinner" style="display:none;"></span>
                    </button>

                    <div id="unpacked-alert" class="mt-2">
                        &#x26A0; <span id="unpacked-msg"></span>
                    </div>
                </div>
            </div>

        </div>
        <!-- end sidebar -->

        <!-- ─── Main Area ────────────────────────────── -->
        <div id="main-area">

            <!-- 3D Viewer -->
            <div class="panel-card" id="viewer-card">
                <div class="panel-header" style="cursor:default; pointer-events:none;">
                    &#x1F5C2;&#xFE0F; 3D 视图 &nbsp;
                    <small class="viewer-hint">拖动旋转 · 滚轮缩放</small>
                </div>
                <div id="canvas-wrapper">
                    <canvas id="canvas"></canvas>
                    <div class="spinner-overlay" id="spinner-overlay">
                        <div class="spinner-overlay-inner">
                            <div class="spinner-ring large"></div>
                            <div class="spinner-label">求解中...</div>
                        </div>
                    </div>
                </div>
                <div id="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">装箱率</span>
                        <span class="stat-value" id="stat-util">—</span>
                        <span class="stat-unit">%</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-label">箱子数</span>
                        <span class="stat-value" id="stat-boxes">0</span>
                        <span class="stat-unit" id="stat-boxes-total"></span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-label">&#x2696;&#xFE0F; 总重量</span>
                        <span class="stat-value" id="stat-weight">0</span>
                        <span class="stat-unit">kg</span>
                    </div>
                </div>
            </div>

            <!-- Box list -->
            <div class="panel-card" id="box-list-section">
                <div class="panel-header" id="hdr-boxlist">
                    <span class="panel-drag-grip">&#8942;</span>
                    &#x1F4CB; 箱子列表
                    <span id="box-count-badge" class="count-badge">0</span>
                    <button class="btn btn-danger-outline btn-sm drag-ignore" onclick="clearAllBoxes(event)">清空全部</button>
                    <span class="toggle-icon" style="margin-left:4px;">&#9660;</span>
                </div>
                <div class="panel-body panel-body-scroll" id="panel-boxlist" style="padding:0;">
                    <table class="data-table" id="box-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>名称</th>
                                <th>尺寸 (W×H×D)</th>
                                <th>&#x2696;&#xFE0F;</th>
                                <th>约束</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="box-table-body"></tbody>
                    </table>
                </div>
            </div>

        </div>
        <!-- end main area -->

    </div>
    <!-- end app-body -->
</div>
<!-- end app-wrapper -->

<script src="./js/lib/three.js"></script>
<script src="./js/lib/OrbitControls.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
